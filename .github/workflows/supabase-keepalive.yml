name: Supabase Keepalive

on:
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Ping keepalive endpoint
        env:
          KEEPALIVE_URL: https://uixskills.com/api/keepalive
        run: |
          ts="$(date +%s)"
          curl --fail --show-error --silent --location \
            --retry 3 \
            --retry-delay 5 \
            --max-time 30 \
            -H "User-Agent: uixskills-keepalive-action/1.0" \
            "${KEEPALIVE_URL}?ts=${ts}"
